{% extends 'base.html' %}
{% block title %}Sign up — Praiso{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
<div class="w-full max-w-md">
  <div class="text-center mb-8">
    <a href="/" class="text-2xl font-extrabold text-indigo-600">✦ Praiso</a>
    <h1 class="text-2xl font-bold mt-4">Create your account</h1>
    <p class="text-gray-500 mt-1">Start collecting testimonials in 60 seconds</p>
  </div>
  <form method="POST" class="bg-white p-8 rounded-2xl border space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="email" required class="w-full border rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" name="password" required minlength="8" class="w-full border rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
    </div>
    <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-medium hover:bg-indigo-700">Create account</button>
  </form>
  <p class="text-center text-sm text-gray-500 mt-4">Already have an account? <a href="/login" class="text-indigo-600 font-medium">Log in</a></p>
</div>
</div>
{% endblock %}

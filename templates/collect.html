<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ project.collect_page_title }} — {{ project.name }}</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Inter',sans-serif}</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4 py-12">
<div class="w-full max-w-lg">
  <div class="text-center mb-8">
    <h1 class="text-2xl font-bold text-gray-900">{{ project.collect_page_title }}</h1>
    <p class="text-gray-500 mt-2">{{ project.collect_page_desc }}</p>
  </div>
  <form method="POST" class="bg-white p-8 rounded-2xl border shadow-sm space-y-5">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Your name *</label>
      <input type="text" name="name" required class="w-full border rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="email" class="w-full border rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Title / Role</label>
        <input type="text" name="title" placeholder="CEO, Developer..." class="w-full border rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Company</label>
        <input type="text" name="company" class="w-full border rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Rating *</label>
      <div class="flex gap-2 text-3xl cursor-pointer" id="star-rating">
        <span onclick="setRating(1)" class="text-amber-400">★</span>
        <span onclick="setRating(2)" class="text-amber-400">★</span>
        <span onclick="setRating(3)" class="text-amber-400">★</span>
        <span onclick="setRating(4)" class="text-amber-400">★</span>
        <span onclick="setRating(5)" class="text-amber-400">★</span>
      </div>
      <input type="hidden" name="rating" id="rating-input" value="5">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Your testimonial *</label>
      <textarea name="content" required rows="4" placeholder="Tell us about your experience..." class="w-full border rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none"></textarea>
    </div>
    <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-medium hover:bg-indigo-700 transition">Submit Testimonial</button>
  </form>
  <p class="text-center text-xs text-gray-400 mt-4">Powered by <a href="/" class="text-indigo-500">Praiso</a></p>
</div>
<script>
function setRating(n) {
  document.getElementById('rating-input').value = n;
  const stars = document.getElementById('star-rating').children;
  for(let i=0;i<5;i++){
    stars[i].className = i < n ? 'text-amber-400' : 'text-gray-300';
  }
}
</script>
</body></html>
